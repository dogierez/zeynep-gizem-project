<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>English League System App</title>
    <style>
        /* Global Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
            overflow: hidden;
        }

        .hidden {
            display: none !important;
        }

        .screen {
            width: 100%;
            max-width: 800px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Scrollable Landing Page Grid */
        #landing-page {
            justify-content: flex-start;
            overflow-y: auto;
            padding-top: 20px;
            padding-bottom: 40px;
        }

        #landing-page h1 {
            margin-bottom: 20px;
            flex-shrink: 0;
        }

        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 700px;
            padding: 10px;
            box-sizing: border-box;
        }

        .lesson-box {
            background-color: #333;
            border: 2px solid #555;
            border-radius: 10px;
            padding: 20px 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, border-color 0.2s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            box-sizing: border-box;
        }
        
        .lesson-box.active {
            border-color: #4caf50;
            background-color: #1b431c;
        }
        .lesson-box.active:hover {
            transform: scale(1.05);
            background-color: #255c27;
        }

        .lesson-box.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #444;
            background-color: #222;
            color: #aaa;
        }
        
        .coming-soon {
            font-size: 12px;
            color: #ffa500;
            margin-top: 5px;
            font-weight: normal;
        }

        /* Match Game Layout */
        .game-header {
            margin-top: 5px;
            margin-bottom: 5px;
            text-align: center;
            flex-shrink: 0;
        }
        .game-header h2 {
            margin: 0 0 2px 0;
            font-size: 18px;
        }
        .game-header p {
            margin: 0;
            font-size: 13px;
        }

        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            flex-grow: 1;
            justify-content: space-evenly;
            padding-bottom: 5px;
        }

        .word-pool {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            width: 100%;
        }

        .match-btn {
            border: 4px solid;
            border-radius: 10px;
            padding: 6px 4px;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.1;
            min-height: 50px;
            box-sizing: border-box;
        }
        .match-btn:disabled {
            opacity: 0;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-tr {
            background-color: #1b431c;
            border-color: #4caf50;
        }
        .btn-tr.selected {
            background-color: #4caf50;
            color: #000000;
        }
        
        .btn-en {
            background-color: #0d3b66;
            border-color: #2196f3;
        }
        .btn-en.selected {
            background-color: #2196f3;
            color: #000000;
        }

        /* Skip Button */
        .action-footer {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 5px 0 10px 0;
            flex-shrink: 0;
        }

        .skip-btn {
            background-color: #333333;
            border: 2px dashed #ffa500;
            color: #ffa500;
            border-radius: 8px;
            padding: 10px 30px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }
        .skip-btn:hover {
            background-color: #ffa500;
            color: #121212;
        }

        /* Flashcards Section */
        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            padding: 10px 20px;
            font-size: 18px;
            background-color: #222;
            box-sizing: border-box;
            border-bottom: 2px solid #444;
            flex-shrink: 0;
        }
        .flashcard-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding-bottom: 20px;
        }
        .flashcard {
            background-color: #2a2a2a;
            border: 4px solid #ffa500;
            border-radius: 15px;
            padding: 30px 20px;
            width: 100%;
            max-width: 600px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            box-sizing: border-box;
        }
        .fc-text {
            font-size: 34px;
            font-weight: bold;
            margin: 15px 0;
            line-height: 1.4;
            text-align: center;
        }
        #fc-tr {
            color: #ffff00;
        }
        #fc-en {
            color: #ffffff;
        }
        
        /* Bright Blue Underline and Clickable Setup */
        .keyword {
            text-decoration: underline;
            text-decoration-color: #00ffff;
            text-decoration-thickness: 3px;
            text-underline-offset: 4px;
            cursor: pointer; /* Indicates it's tappable */
            transition: background-color 0.2s;
            border-radius: 4px;
        }
        .keyword:hover {
            background-color: rgba(0, 255, 255, 0.2);
        }
        
        /* Custom Dictionary Tooltip */
        #dict-tooltip {
            position: absolute;
            background-color: #121212;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none; /* So it doesn't block clicks */
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            transform: translate(-50%, -100%);
            margin-top: -10px; /* Spacing above the word */
        }

        .separator {
            width: 80%;
            height: 4px;
            background-color: #ff3333;
            margin: 15px 0;
        }
        .controls-hint {
            margin-top: 20px;
            color: #aaa;
            font-size: 14px;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            flex-shrink: 0;
        }
        .key-badge {
            background-color: #444;
            padding: 5px 10px;
            border-radius: 5px;
            color: #fff;
            font-weight: bold;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .word-pool { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .match-btn { font-size: 18px; min-height: 46px; }
            .lessons-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 480px) {
            .word-pool { grid-template-columns: repeat(2, 1fr); gap: 6px; }
            .match-btn { font-size: 16px; min-height: 42px; border-width: 3px; }
            .fc-text { font-size: 24px; }
            .lessons-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <div id="dict-tooltip" class="hidden"></div>

    <div id="landing-page" class="screen">
        <h1>League System Hub</h1>
        <div id="hub-grid" class="lessons-grid"></div>
    </div>

    <div id="game1-match" class="screen hidden">
        <div class="game-header">
            <h2>Match the Words</h2>
            <p>Select <span style="color:#4caf50; font-weight:bold;">Turkish</span> first, then <span style="color:#2196f3; font-weight:bold;">English</span>.</p>
        </div>
        <div class="game-grid">
            <div id="g1-tr-col" class="word-pool"></div>
            <div id="g1-en-col" class="word-pool"></div>
        </div>
        <div class="action-footer">
            <button class="skip-btn" onclick="startGameFlashcards()">Skip to Flashcards ➔</button>
        </div>
    </div>

    <div id="game-flashcards" class="screen hidden">
        <div class="hud">
            <div>Cards: <span id="hud-remaining">0</span> / <span id="hud-total">0</span></div>
            <div>Correct: <span id="hud-correct" style="color: #4caf50; font-weight: bold;">0</span></div>
        </div>
        <div class="flashcard-container">
            <div class="flashcard">
                <div id="fc-tr" class="fc-text"></div>
                <div id="fc-separator" class="separator hidden"></div>
                <div id="fc-en" class="fc-text hidden"></div>
            </div>
            <div class="controls-hint">
                <span><span class="key-badge">↑</span> Reveal</span>
                <span><span class="key-badge">→</span> Correct</span>
                <span><span class="key-badge">←</span> Wrong</span>
                <span><span class="key-badge">↓</span> Undo</span>
            </div>
        </div>
    </div>

    <script>
        // --- Data Definitions ---
        const vocabulary = [
            { tr: "Bronzlaşmak", en: "To get a tan" },
            { tr: "Dinlenmek", en: "To rest" },
            { tr: "Giriş ücreti", en: "Entrance fee" },
            { tr: "Gölge", en: "Shade" },
            { tr: "Güneşlenmek", en: "To sunbathe" },
            { tr: "Havlu", en: "Towel" },
            { tr: "Kum", en: "Sand" },
            { tr: "Kumsal", en: "Beach" },
            { tr: "Mola vermek", en: "To take a break" },
            { tr: "Şemsiye", en: "Umbrella" },
            { tr: "Şezlong", en: "Sunbed" },
            { tr: "Terlik", en: "Flipflop" }
        ];

        // Processed sentences with corrections and data-dict translation attributes
        const sentences = [
            { 
                tr: "<span class='keyword' data-dict='Sunbed'>Şezlong</span>a para ödemek zorundaydık ama <span class='keyword' data-dict='Umbrella'>şemsiye</span>ye para ödemek zorunda değildik.", 
                en: "We had to pay for the <span class='keyword' data-dict='Şezlong'>sunbed</span>, but we didn't have to pay for the <span class='keyword' data-dict='Şemsiye'>umbrella</span>." 
            },
            { 
                tr: "<span class='keyword' data-dict='Beach'>Kumsal</span>da <span class='keyword' data-dict='To rest'>dinlen</span>emedim bu yüzden <span class='keyword' data-dict='To sunbathe'>güneşlenmeyi</span> tercih ettim.", 
                en: "I couldn't <span class='keyword' data-dict='Dinlenmek'>rest</span> on the <span class='keyword' data-dict='Kumsal'>beach</span>, so I preferred to <span class='keyword' data-dict='Güneşlenmek'>sunbathe</span>." 
            },
            { 
                tr: "<span class='keyword' data-dict='Towel'>Havlu</span>nu <span class='keyword' data-dict='Sand'>kum</span>a koyabilirsin ve <span class='keyword' data-dict='To sunbathe'>güneşlen</span>ebilirsin.", 
                en: "You can put your <span class='keyword' data-dict='Havlu'>towel</span> on the <span class='keyword' data-dict='Kum'>sand</span> and <span class='keyword' data-dict='Güneşlenmek'>sunbathe</span>." 
            },
            { 
                tr: "Güneş vardı ama <span class='keyword' data-dict='To get a tan'>bronzlaş</span>amadım.", 
                en: "It was sunny, but I couldn't <span class='keyword' data-dict='Bronzlaşmak'>get a tan</span>." 
            },
            { 
                tr: "Çantamda <span class='keyword' data-dict='Towel'>havlu</span>m vardı yoksa <span class='keyword' data-dict='Towel'>havlu</span> almak zorundaydım.", 
                en: "I had a <span class='keyword' data-dict='Havlu'>towel</span> in my bag, otherwise I had to take a <span class='keyword' data-dict='Havlu'>towel</span>." 
            },
            { 
                tr: "Bir <span class='keyword' data-dict='To take a break'>mola ver</span>dik sonra <span class='keyword' data-dict='Beach'>kumsal</span>da <span class='keyword' data-dict='To get a tan'>bronzlaş</span>tık.", 
                en: "We <span class='keyword' data-dict='Mola vermek'>took a break</span>, then we <span class='keyword' data-dict='Bronzlaşmak'>got a tan</span> on the <span class='keyword' data-dict='Kumsal'>beach</span>." 
            },
            { 
                tr: "<span class='keyword' data-dict='Sunbed'>Şezlong</span>um kirliydi.", 
                en: "My <span class='keyword' data-dict='Şezlong'>sunbed</span> was dirty." 
            },
            { 
                tr: "<span class='keyword' data-dict='Towel'>Havlu</span>larımız ıslaktı.", 
                en: "Our <span class='keyword' data-dict='Havlu'>towels</span> were wet." 
            },
            { 
                tr: "Kızım <span class='keyword' data-dict='Sand'>kum</span>dan nefret ediyor.", 
                en: "My daughter hates <span class='keyword' data-dict='Kum'>sand</span>." 
            },
            { 
                tr: "<span class='keyword' data-dict='Beach'>Kumsal</span>da müzik beni rahatsız ediyor.", 
                en: "The music on the <span class='keyword' data-dict='Kumsal'>beach</span> bothers me." 
            },
            { 
                tr: "Çocuklar <span class='keyword' data-dict='Beach'>kumsal</span>da <span class='keyword' data-dict='Sand'>kum</span>la oynuyordu.", 
                en: "The children were playing with the <span class='keyword' data-dict='Kum'>sand</span> on the <span class='keyword' data-dict='Kumsal'>beach</span>." 
            },
            { 
                tr: "<span class='keyword' data-dict='Shade'>Gölge</span>de <span class='keyword' data-dict='To get a tan'>bronzlaş</span>tık.", 
                en: "We <span class='keyword' data-dict='Bronzlaşmak'>got a tan</span> in the <span class='keyword' data-dict='Gölge'>shade</span>." 
            },
            { 
                tr: "<span class='keyword' data-dict='Entrance fee'>Giriş ücretleri</span> Türkiye'den ucuz.", 
                en: "<span class='keyword' data-dict='Giriş ücreti'>Entrance fees</span> are cheaper than in Türkiye." 
            },
            { 
                tr: "Tatilde her yerde <span class='keyword' data-dict='To take a break'>mola ver</span>dik.", 
                en: "We <span class='keyword' data-dict='Mola vermek'>took a break</span> everywhere on vacation." 
            },
            { 
                tr: "Kızım <span class='keyword' data-dict='Towel'>havlu</span>sunu kaybetmişti.", 
                en: "My daughter had lost her <span class='keyword' data-dict='Havlu'>towel</span>." 
            },
            { 
                tr: "<span class='keyword' data-dict='Entrance fee'>Giriş ücreti</span> öğlen yemeğini kapsıyordu.", 
                en: "The <span class='keyword' data-dict='Giriş ücreti'>entrance fee</span> included lunch." 
            },
            { 
                tr: "Bazı <span class='keyword' data-dict='Beach'>kumsal</span>larda <span class='keyword' data-dict='Sunbed'>şezlong</span> için para almazlardı.", 
                en: "On some <span class='keyword' data-dict='Kumsal'>beaches</span>, they wouldn't charge money for <span class='keyword' data-dict='Şezlong'>sunbeds</span>." 
            },
            { 
                tr: "Havuzun yanında <span class='keyword' data-dict='To rest'>dinlen</span>emedim.", 
                en: "I couldn't <span class='keyword' data-dict='Dinlenmek'>rest</span> by the pool." 
            },
            { 
                tr: "Gençler <span class='keyword' data-dict='Beach'>kumsal</span>da voleybol oynuyordu.", 
                en: "The teenagers were playing volleyball on the <span class='keyword' data-dict='Kumsal'>beach</span>." 
            },
            { 
                tr: "Turistler <span class='keyword' data-dict='Towel'>havlu</span>larını <span class='keyword' data-dict='Sunbed'>şezlong</span>larına koyuyordu.", 
                en: "The tourists were putting their <span class='keyword' data-dict='Havlu'>towels</span> on their <span class='keyword' data-dict='Şezlong'>sunbeds</span>." 
            },
            { 
                tr: "<span class='keyword' data-dict='Flipflop'>Terlik</span>lerimi <span class='keyword' data-dict='Sand'>kum</span>da kaybettim.", 
                en: "I lost my <span class='keyword' data-dict='Terlik'>flip-flops</span> in the <span class='keyword' data-dict='Kum'>sand</span>." 
            },
            { 
                tr: "<span class='keyword' data-dict='Flipflop'>Terlik</span>lerim <span class='keyword' data-dict='Towel'>havlu</span>mun altındaydı.", 
                en: "My <span class='keyword' data-dict='Terlik'>flip-flops</span> were under my <span class='keyword' data-dict='Havlu'>towel</span>." 
            },
            { 
                tr: "Birisi <span class='keyword' data-dict='Towel'>havlu</span>mu <span class='keyword' data-dict='Sunbed'>şezlong</span>umdan aldı.", 
                en: "Someone took my <span class='keyword' data-dict='Havlu'>towel</span> from my <span class='keyword' data-dict='Şezlong'>sunbed</span>." 
            },
            { 
                tr: "<span class='keyword' data-dict='To rest'>Dinlen</span>dim ama <span class='keyword' data-dict='To sunbathe'>güneşlen</span>emedim.", 
                en: "I <span class='keyword' data-dict='Dinlenmek'>rested</span> but I couldn't <span class='keyword' data-dict='Güneşlenmek'>sunbathe</span>." 
            },
            { 
                tr: "Plajda hiçbir yerde <span class='keyword' data-dict='Shade'>gölge</span> yoktu.", 
                en: "There was <span class='keyword' data-dict='Gölge'>shade</span> nowhere on the beach." 
            }
        ];

        // --- Custom Dictionary Tooltip Logic ---
        const tooltip = document.getElementById('dict-tooltip');
        
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('keyword')) {
                const word = e.target.getAttribute('data-dict');
                tooltip.innerText = word;
                tooltip.classList.remove('hidden');
                
                // Position tooltip above the clicked word
                const rect = e.target.getBoundingClientRect();
                tooltip.style.left = (rect.left + (rect.width / 2)) + 'px';
                tooltip.style.top = rect.top + 'px'; 
            } else {
                tooltip.classList.add('hidden');
            }
        });

        // Hide tooltip if scrolling
        window.addEventListener('scroll', () => tooltip.classList.add('hidden'));

        // --- Generate Hub UI (25 Boxes) ---
        const hubGrid = document.getElementById('hub-grid');
        for (let i = 1; i <= 25; i++) {
            const box = document.createElement('div');
            if (i === 1) {
                box.className = 'lesson-box active';
                box.innerHTML = `Lesson ${i}<br><span style="font-size:13px; font-weight:normal;">At the Beach</span>`;
                box.onclick = () => startGame1();
            } else {
                box.className = 'lesson-box disabled';
                box.innerHTML = `Lesson ${i}<br><span class="coming-soon">Coming Soon</span>`;
            }
            hubGrid.appendChild(box);
        }

        // --- Utility Functions ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function switchScreen(screenId) {
            tooltip.classList.add('hidden'); // Clear tooltips on screen switch
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }

        // --- Game 1 Logic (Word Match) ---
        let g1SelectedTr = null;
        let g1Matches = 0;

        function startGame1() {
            g1Matches = 0;
            g1SelectedTr = null;
            switchScreen('game1-match');
            const trCol = document.getElementById('g1-tr-col');
            const enCol = document.getElementById('g1-en-col');
            trCol.innerHTML = ''; enCol.innerHTML = '';

            const shuffledTr = shuffleArray([...vocabulary]);
            const shuffledEn = shuffleArray([...vocabulary]);

            shuffledTr.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'match-btn btn-tr';
                btn.innerText = item.tr;
                btn.onclick = () => selectTr(btn, item.tr);
                trCol.appendChild(btn);
            });

            shuffledEn.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'match-btn btn-en';
                btn.innerText = item.en;
                btn.onclick = () => selectEn(btn, item.tr);
                enCol.appendChild(btn);
            });
        }

        function selectTr(btn, trWord) {
            document.querySelectorAll('#g1-tr-col .match-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            g1SelectedTr = { btn, word: trWord };
        }

        function selectEn(btn, correctTrWord) {
            if (!g1SelectedTr) return;

            if (g1SelectedTr.word === correctTrWord) {
                btn.disabled = true;
                g1SelectedTr.btn.disabled = true;
                g1Matches++;
                g1SelectedTr = null;

                if (g1Matches === vocabulary.length) {
                    setTimeout(startGameFlashcards, 600); 
                }
            } else {
                g1SelectedTr.btn.classList.remove('selected');
                g1SelectedTr = null;
            }
        }

        // --- Game 2 Logic (Flashcards) ---
        let currentCardIndex = 0;
        let correctCount = 0;
        let historyStack = [];

        function startGameFlashcards() {
            currentCardIndex = 0;
            correctCount = 0;
            historyStack = [];
            switchScreen('game-flashcards');
            document.getElementById('hud-total').innerText = sentences.length;
            updateFlashcard();
            document.addEventListener('keydown', handleKeyPress);
        }

        function updateFlashcard() {
            tooltip.classList.add('hidden'); // Clear tooltip when card changes
            
            if (currentCardIndex >= sentences.length) {
                document.getElementById('fc-tr').innerHTML = "Lesson Completed!";
                document.getElementById('fc-separator').classList.add('hidden');
                document.getElementById('fc-en').classList.add('hidden');
                document.removeEventListener('keydown', handleKeyPress);
                return;
            }

            document.getElementById('hud-remaining').innerText = sentences.length - currentCardIndex;
            document.getElementById('hud-correct').innerText = correctCount;

            document.getElementById('fc-tr').innerHTML = sentences[currentCardIndex].tr;
            document.getElementById('fc-en').innerHTML = sentences[currentCardIndex].en;
            
            document.getElementById('fc-separator').classList.add('hidden');
            document.getElementById('fc-en').classList.add('hidden');
        }

        function handleKeyPress(e) {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.code) > -1) {
                e.preventDefault();
            }

            if (currentCardIndex >= sentences.length && e.key !== 'ArrowDown') return;

            if (e.key === 'ArrowUp') {
                document.getElementById('fc-separator').classList.remove('hidden');
                document.getElementById('fc-en').classList.remove('hidden');
            } 
            else if (e.key === 'ArrowRight') {
                if(document.getElementById('fc-en').classList.contains('hidden')) return; 
                historyStack.push({ type: 'correct' });
                correctCount++;
                currentCardIndex++;
                updateFlashcard();
            } 
            else if (e.key === 'ArrowLeft') {
                if(document.getElementById('fc-en').classList.contains('hidden')) return;
                historyStack.push({ type: 'wrong' });
                currentCardIndex++;
                updateFlashcard();
            } 
            else if (e.key === 'ArrowDown') {
                if (historyStack.length > 0) {
                    const lastAction = historyStack.pop();
                    currentCardIndex--;
                    if (lastAction.type === 'correct') {
                        correctCount--;
                    }
                    if (currentCardIndex < sentences.length) {
                        document.addEventListener('keydown', handleKeyPress); 
                    }
                    updateFlashcard();
                }
            }
        }
    </script>
</body>
</html>
