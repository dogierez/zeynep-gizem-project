<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Thematic Vocabulary and Grammar Cocktail</title>
    <style>
        /* Global Styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #3b1010; 
            background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cg stroke='rgba(255,255,255,0.06)' stroke-width='2' fill='none' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M30,80 V30 Q45,20 60,30 Q75,20 90,30 V80 Q75,70 60,80 Q45,70 30,80 Z M60,30 V80' /%3E%3Cpath d='M140,50 L120,70 L130,80 L150,60 Z M120,70 L110,80 L115,85 L125,75 Z M150,60 L160,50 L150,40 L140,50' /%3E%3Ccircle cx='100' cy='150' r='15' /%3E%3Cellipse cx='100' cy='150' rx='25' ry='10' transform='rotate(45 100 150)' /%3E%3Cellipse cx='100' cy='150' rx='25' ry='10' transform='rotate(-45 100 150)' /%3E%3C/g%3E%3C/svg%3E");
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
        }

        .hidden {
            display: none !important;
        }

        .screen {
            width: 100%;
            max-width: 800px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 10px;
            box-sizing: border-box;
        }

        /* Scrollable Landing Page Grid */
        #landing-page {
            justify-content: flex-start;
            padding-top: 20px;
            padding-bottom: 40px;
        }

        #landing-page h1 {
            margin-bottom: 20px;
            flex-shrink: 0;
            text-align: center;
            font-size: 28px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .lessons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 700px;
            padding: 10px;
            box-sizing: border-box;
        }

        .lesson-box {
            background-color: rgba(30, 30, 30, 0.9);
            border: 2px solid #555;
            border-radius: 10px;
            padding: 20px 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, border-color 0.2s;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100px;
            box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        
        .lesson-box.active {
            border-color: #4caf50;
            background-color: rgba(27, 67, 28, 0.9);
        }
        .lesson-box.active:hover {
            transform: scale(1.05);
            background-color: rgba(37, 92, 39, 0.9);
        }

        .lesson-box.disabled {
            opacity: 0.7;
            cursor: not-allowed;
            border-color: #444;
            background-color: rgba(20, 20, 20, 0.8);
            color: #aaa;
        }
        
        .coming-soon {
            font-size: 12px;
            color: #ffa500;
            margin-top: 5px;
            font-weight: normal;
        }

        /* Match Game Layout */
        .game-header {
            margin-top: 5px;
            margin-bottom: 5px;
            text-align: center;
            flex-shrink: 0;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }
        .game-header h2 {
            margin: 0 0 2px 0;
            font-size: 18px;
        }
        .game-header p {
            margin: 0;
            font-size: 13px;
        }

        .game-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            flex-grow: 1;
            justify-content: space-evenly;
            padding-bottom: 5px;
        }

        .word-pool {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
        }

        .match-btn {
            border: 4px solid;
            border-radius: 10px;
            padding: 6px 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            word-wrap: break-word;
            overflow-wrap: break-word;
            line-height: 1.1;
            min-height: 50px;
            box-sizing: border-box;
            touch-action: manipulation; 
            flex: 1 1 calc(25% - 10px);
            min-width: 120px;
            max-width: 160px;
        }
        .match-btn:disabled {
            opacity: 0;
            cursor: not-allowed;
            pointer-events: none;
        }

        .btn-tr {
            background-color: #1b431c;
            border-color: #4caf50;
        }
        .btn-tr.selected {
            background-color: #4caf50;
            color: #000000;
        }
        
        .btn-en {
            background-color: #0d3b66;
            border-color: #2196f3;
        }
        .btn-en.selected {
            background-color: #2196f3;
            color: #000000;
        }

        /* Skip Button */
        .action-footer {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 15px 0 20px 0;
            flex-shrink: 0;
            gap: 15px;
        }

        .action-btn {
            background-color: #111;
            border: 2px dashed #ffa500;
            color: #ffa500;
            border-radius: 8px;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, color 0.2s;
        }
        .action-btn:hover {
            background-color: #ffa500;
            color: #121212;
        }

        /* Flashcards Section */
        .hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            padding: 10px 20px;
            font-size: 18px;
            background-color: rgba(0, 0, 0, 0.8);
            box-sizing: border-box;
            border-bottom: 2px solid #444;
            flex-shrink: 0;
        }
        
        .hud-stats {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            font-size: 16px;
        }

        .flashcard-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding-bottom: 20px;
            touch-action: pan-x pan-y; 
        }
        .flashcard {
            background-color: #000000; 
            border: 4px solid #ffa500; 
            border-radius: 15px;
            padding: 30px 20px;
            width: 100%;
            max-width: 600px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            box-sizing: border-box;
            user-select: none; 
        }
        .fc-text {
            font-size: 30px;
            font-weight: bold;
            margin: 15px 0;
            line-height: 1.4;
            text-align: center;
        }
        #fc-tr {
            color: #ffff00;
        }
        #fc-en {
            color: #ffffff;
        }
        
        .keyword {
            text-decoration: underline;
            text-decoration-color: #00ffff;
            text-decoration-thickness: 3px;
            text-underline-offset: 4px;
            cursor: pointer; 
            transition: background-color 0.2s;
            border-radius: 4px;
        }
        .keyword:hover {
            background-color: rgba(0, 255, 255, 0.2);
        }
        
        #dict-tooltip {
            position: absolute;
            background-color: #121212;
            color: #00ffff;
            border: 2px solid #00ffff;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 20px;
            font-weight: bold;
            z-index: 1000;
            pointer-events: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            transform: translate(-50%, -100%);
            margin-top: -10px; 
            white-space: nowrap; 
        }

        .separator {
            width: 80%;
            height: 4px;
            background-color: #ff3333;
            margin: 15px 0;
        }
        .controls-hint {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            flex-shrink: 0;
            width: 100%;
        }

        .control-btn {
            background-color: rgba(0, 0, 0, 0.7);
            border: 2px solid #444;
            border-radius: 8px;
            color: #aaa;
            font-size: 14px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .control-btn:hover, .control-btn:active {
            background-color: #444;
            color: #fff;
            border-color: #ffa500;
        }

        .key-badge {
            background-color: #444;
            padding: 4px 8px;
            border-radius: 4px;
            color: #fff;
            font-weight: bold;
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            .match-btn { 
                flex: 1 1 calc(33.333% - 10px); 
                max-width: 140px;
            }
            .lessons-grid { grid-template-columns: repeat(3, 1fr); }
            #landing-page h1 { font-size: 24px; }
            .fc-text { font-size: 26px; }
        }
        @media (max-width: 480px) {
            .match-btn { 
                flex: 1 1 calc(50% - 10px); 
                font-size: 14px; 
                min-height: 42px; 
                border-width: 3px; 
            }
            .fc-text { font-size: 22px; }
            .lessons-grid { grid-template-columns: repeat(2, 1fr); }
            .control-btn { font-size: 12px; padding: 6px 10px; }
        }
    </style>
</head>
<body>

    <!-- Dictionary Tooltip -->
    <div id="dict-tooltip" class="hidden"></div>

    <!-- Landing Page Hub -->
    <div id="landing-page" class="screen">
        <h1>Thematic Vocabulary and Grammar Cocktail</h1>
        <div id="hub-grid" class="lessons-grid"></div>
    </div>

    <!-- Game 1: Word Match -->
    <div id="game1-match" class="screen hidden">
        <div class="game-header">
            <h2 id="match-game-title">Match the Words</h2>
            <p>Select <span style="color:#4caf50; font-weight:bold;">Turkish</span> first, then <span style="color:#2196f3; font-weight:bold;">English</span>.</p>
        </div>
        <div class="game-grid">
            <div id="g1-tr-col" class="word-pool"></div>
            <div id="g1-en-col" class="word-pool"></div>
        </div>
        <div class="action-footer">
            <button class="action-btn" onclick="switchScreen('landing-page')">← Hub</button>
            <button class="action-btn" onclick="startGameFlashcards()">Skip to Flashcards ➔</button>
        </div>
    </div>

    <!-- Game 2: Flashcards -->
    <div id="game-flashcards" class="screen hidden">
        <div class="hud">
            <div>Cards: <span id="hud-remaining">0</span> / <span id="hud-total">0</span></div>
            <div class="hud-stats">
                <div>Correct: <span id="hud-correct" style="color: #4caf50; font-weight: bold;">0</span></div>
                <div>Incorrect: <span id="hud-incorrect" style="color: #ff3333; font-weight: bold;">0</span></div>
            </div>
        </div>
        
        <div class="action-footer" style="padding-top: 10px; padding-bottom: 5px;">
            <button class="action-btn" style="padding: 5px 15px; font-size: 14px;" onclick="switchScreen('landing-page')">← Back to Hub</button>
        </div>
        
        <!-- Flashcard swiping container -->
        <div class="flashcard-container" id="fc-container">
            <div class="flashcard">
                <div id="fc-tr" class="fc-text"></div>
                <div id="fc-separator" class="separator hidden"></div>
                <div id="fc-en" class="fc-text hidden"></div>
            </div>
            
            <!-- Mobile Tappable Buttons -->
            <div class="controls-hint">
                <button class="control-btn" onclick="simulateKey('ArrowUp')">
                    <span class="key-badge">↑</span> Reveal
                </button>
                <button class="control-btn" onclick="simulateKey('ArrowRight')">
                    <span class="key-badge">→</span> Correct
                </button>
                <button class="control-btn" onclick="simulateKey('ArrowLeft')">
                    <span class="key-badge">←</span> Wrong
                </button>
                <button class="control-btn" onclick="simulateKey('ArrowDown')">
                    <span class="key-badge">↓</span> Undo
                </button>
            </div>
        </div>
    </div>

    <script>

        const lessonData = {

                    { tr: "Ülkenizde <span class='keyword' data-dict='How long'>ne kadar süre</span> kalacağıma karar veremedim.", en: "I couldn't decide <span class='keyword' data-dict='Ne kadar süre'>how long</span> I will stay in your country." },
                    { tr: "<span class='keyword' data-dict='Purpose of travel'>Seyahat amacı</span>mı kanıtlamak için rezervasyonumu göstermiştim.", en: "I had shown my reservation to prove my <span class='keyword' data-dict='Seyahat amacı'>purpose of travel</span>." },
                    { tr: "<span class='keyword' data-dict='Travel document'>Seyahat belge</span>mi kontrol etsinler diye onlara verdim.", en: "I gave them my <span class='keyword' data-dict='Seyahat belgesi'>travel document</span> so they could check it." },
                    { tr: "<span class='keyword' data-dict='Illegal'>Yasa dışı</span> hiçbir şey taşımadığımı <span class='keyword' data-dict='(to) declare'>beyan ettim</span>.", en: "I <span class='keyword' data-dict='Beyan etmek'>declared</span> that I didn't carry anything <span class='keyword' data-dict='Yasa dışı'>illegal</span>." },
                    { tr: "Yurt dışını <span class='keyword' data-dict='(to) visit'>ziyaret etmek</span> pahalandı.", en: "It got expensive to <span class='keyword' data-dict='Ziyaret etmek'>visit</span> abroad." }
                ]
            }
        };

        let currentActiveLesson = 1;
        let activeVocabulary = [];
        let activeSentences = [];

        // --- Custom Dictionary Tooltip Logic ---
        const tooltip = document.getElementById('dict-tooltip');
        
        document.addEventListener('click', function(e) {
            if (e.target.classList.contains('keyword')) {
                const word = e.target.getAttribute('data-dict');
                tooltip.innerText = word;
                tooltip.classList.remove('hidden');
                
                const rect = e.target.getBoundingClientRect();
                let leftPos = rect.left + (rect.width / 2);
                if (leftPos < 60) leftPos = 60;
                if (leftPos > window.innerWidth - 60) leftPos = window.innerWidth - 60;
                
                tooltip.style.left = leftPos + 'px';
                tooltip.style.top = rect.top + window.scrollY + 'px'; 
            } else {
                tooltip.classList.add('hidden');
            }
        });

        window.addEventListener('scroll', () => tooltip.classList.add('hidden'));

        // --- Generate Hub UI (25 Boxes) ---
        const hubGrid = document.getElementById('hub-grid');
        for (let i = 1; i <= 25; i++) {
            const box = document.createElement('div');
            if (lessonData[i]) {
                box.className = 'lesson-box active';
                box.innerHTML = `Lesson ${i}<br><span style="font-size:13px; font-weight:normal;">${lessonData[i].title}</span>`;
                box.onclick = () => startGame(i);
            } else {
                box.className = 'lesson-box disabled';
                box.innerHTML = `Lesson ${i}<br><span class="coming-soon">Coming Soon</span>`;
            }
            hubGrid.appendChild(box);
        }

        // --- Utility Functions ---
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function switchScreen(screenId) {
            tooltip.classList.add('hidden'); 
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
            window.scrollTo(0, 0); 
        }

        // --- Game 1 Logic (Word Match) ---
        let g1SelectedTr = null;
        let g1Matches = 0;

        function startGame(lessonId) {
            currentActiveLesson = lessonId;
            activeVocabulary = lessonData[lessonId].vocabulary;
            
            document.getElementById('match-game-title').innerText = `Match the Words (${lessonData[lessonId].title})`;
            
            g1Matches = 0;
            g1SelectedTr = null;
            switchScreen('game1-match');
            const trCol = document.getElementById('g1-tr-col');
            const enCol = document.getElementById('g1-en-col');
            trCol.innerHTML = ''; enCol.innerHTML = '';

            // Turkish is randomly shuffled every time
            const shuffledTr = shuffleArray([...activeVocabulary]);
            
            // English is locked to alphabetical order
            const sortedEn = [...activeVocabulary].sort((a, b) => a.en.localeCompare(b.en));

            shuffledTr.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'match-btn btn-tr';
                btn.innerText = item.tr;
                btn.onclick = () => selectTr(btn, item.tr);
                trCol.appendChild(btn);
            });

            sortedEn.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'match-btn btn-en';
                btn.innerText = item.en;
                // Identify the correct corresponding Turkish word
                const correctTr = activeVocabulary.find(v => v.en === item.en).tr;
                btn.onclick = () => selectEn(btn, correctTr);
                enCol.appendChild(btn);
            });
        }

        function selectTr(btn, trWord) {
            document.querySelectorAll('#g1-tr-col .match-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            g1SelectedTr = { btn, word: trWord };
        }

        function selectEn(btn, correctTrWord) {
            if (!g1SelectedTr) return;

            if (g1SelectedTr.word === correctTrWord) {
                btn.disabled = true;
                g1SelectedTr.btn.disabled = true;
                g1Matches++;
                g1SelectedTr = null;

                if (g1Matches === activeVocabulary.length) {
                    setTimeout(startGameFlashcards, 600); 
                }
            } else {
                g1SelectedTr.btn.classList.remove('selected');
                g1SelectedTr = null;
            }
        }

        // --- Game 2 Logic (Flashcards) & Mobile Swipe Logic ---
        let currentCardIndex = 0;
        let correctCount = 0;
        let incorrectCount = 0;
        let historyStack = [];

        function startGameFlashcards() {
            currentCardIndex = 0;
            correctCount = 0;
            incorrectCount = 0;
            historyStack = [];
            
            // Independently shuffle Simple and Complex sentences, then concatenate them.
            // This ensures Simple sentences are always completed randomly before Complex sentences begin.
            const shuffledSimple = shuffleArray([...lessonData[currentActiveLesson].simpleSentences]);
            const shuffledComplex = shuffleArray([...lessonData[currentActiveLesson].complexSentences]);
            activeSentences = [...shuffledSimple, ...shuffledComplex];
            
            switchScreen('game-flashcards');
            document.getElementById('hud-total').innerText = activeSentences.length;
            updateFlashcard();
            document.addEventListener('keydown', handleKeyPress);
        }

        function updateFlashcard() {
            tooltip.classList.add('hidden'); 
            
            if (currentCardIndex >= activeSentences.length) {
                document.getElementById('fc-tr').innerHTML = "Lesson Completed!";
                document.getElementById('fc-separator').classList.add('hidden');
                document.getElementById('fc-en').classList.add('hidden');
                document.removeEventListener('keydown', handleKeyPress);
                return;
            }

            document.getElementById('hud-remaining').innerText = activeSentences.length - currentCardIndex;
            document.getElementById('hud-correct').innerText = correctCount;
            document.getElementById('hud-incorrect').innerText = incorrectCount;

            document.getElementById('fc-tr').innerHTML = activeSentences[currentCardIndex].tr;
            document.getElementById('fc-en').innerHTML = activeSentences[currentCardIndex].en;
            
            document.getElementById('fc-separator').classList.add('hidden');
            document.getElementById('fc-en').classList.add('hidden');
        }

        function simulateKey(keyName) {
            handleKeyPress({ key: keyName, preventDefault: () => {} });
        }

        function handleKeyPress(e) {
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].indexOf(e.key) > -1 && typeof e.preventDefault === 'function') {
                e.preventDefault();
            }

            if (currentCardIndex >= activeSentences.length && e.key !== 'ArrowDown') return;

            if (e.key === 'ArrowUp') {
                document.getElementById('fc-separator').classList.remove('hidden');
                document.getElementById('fc-en').classList.remove('hidden');
            } 
            else if (e.key === 'ArrowRight') {
                if(document.getElementById('fc-en').classList.contains('hidden')) return; 
                historyStack.push({ type: 'correct' });
                correctCount++;
                currentCardIndex++;
                updateFlashcard();
            } 
            else if (e.key === 'ArrowLeft') {
                if(document.getElementById('fc-en').classList.contains('hidden')) return;
                historyStack.push({ type: 'wrong' });
                incorrectCount++;
                currentCardIndex++;
                updateFlashcard();
            } 
            else if (e.key === 'ArrowDown') {
                if (historyStack.length > 0) {
                    const lastAction = historyStack.pop();
                    currentCardIndex--;
                    if (lastAction.type === 'correct') {
                        correctCount--;
                    } else if (lastAction.type === 'wrong') {
                        incorrectCount--;
                    }
                    if (currentCardIndex < activeSentences.length) {
                        document.addEventListener('keydown', handleKeyPress); 
                    }
                    updateFlashcard();
                }
            }
        }

        // --- Touch Swipe Implementation for Flashcards ---
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        const fcContainer = document.getElementById('fc-container');

        fcContainer.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, { passive: true });

        fcContainer.addEventListener('touchend', e => {
            touchEndX = e.changedTouches[0].screenX;
            touchEndY = e.changedTouches[0].screenY;
            handleSwipe();
        }, { passive: true });

        function handleSwipe() {
            const diffX = touchEndX - touchStartX;
            const diffY = touchEndY - touchStartY;
            const absDiffX = Math.abs(diffX);
            const absDiffY = Math.abs(diffY);

            if (Math.max(absDiffX, absDiffY) < 30) return;

            if (absDiffX > absDiffY) {
                if (diffX > 0) {
                    simulateKey('ArrowRight'); 
                } else {
                    simulateKey('ArrowLeft'); 
                }
            } else {
                if (diffY > 0) {
                    simulateKey('ArrowDown'); 
                } else {
                    simulateKey('ArrowUp'); 
                }
            }
        }
    </script>
